workflow: convert-collinear
inputs:
  patterns:
    - ./structures/*.vasp
outputs:
  directory: ./openmx_outputs/collinear
runtime:
  dry_run: true
  skip_errors: false
convert_collinear:
  template: |
    #
    #      File Name      
    #

    System.CurrrentDirectory         ./    # default=./
    System.Name                   openmx
    DATA.PATH           /path/to/DFT_DATA19   # default=../DFT_DATA19
    level.of.stdout                   1    # default=1 (1-3)
    level.of.fileout                  1    # default=1 (0-2)
    HS.fileout                        on   # on|off, default=off

    #
    # SCF or Electronic System
    #

    scf.XcType                  GGA-PBE    # LDA|LSDA-CA|LSDA-PW|GGA-PBE
    scf.SpinPolarization        On        # On|Off|NC
    scf.SpinOrbit.Coupling      off
    scf.partialCoreCorrection   on
    scf.ElectronicTemperature  300.0       # default=300 (K)
    scf.energycutoff           200.0       # default=150 (Ry)
    scf.maxIter                 400        # default=40
    scf.EigenvalueSolver       Band        # DC|GDC|Cluster|Band
    scf.Kgrid                  6 6 6       # means 4x4x4
    scf.Mixing.Type           rmm-diisk     # Simple|Rmm-Diis|Gr-Pulay|Kerker|Rmm-Diisk
    scf.Init.Mixing.Weight     0.0010      # default=0.30 
    scf.Min.Mixing.Weight      0.0001      # default=0.001 
    scf.Max.Mixing.Weight      0.0400      # default=0.40 
    scf.Mixing.History           50
    scf.Mixing.StartPulay        30
    scf.Mixing.EveryPulay        1
    scf.criterion             1.0e-7       # default=1.0e-6 (Hartree)

    #
    # MD or Geometry Optimization
    #

    MD.Type                      Nomd      # Nomd|Opt|NVE|NVT_VS|NVT_NH
                                           # Constraint_Opt|DIIS2|Constraint_DIIS2
    MD.Opt.DIIS.History          4
    MD.Opt.StartDIIS             5         # default=5
    MD.maxIter                 100         # default=1
    MD.TimeStep                1.0         # default=0.5 (fs)
    MD.Opt.criterion          1.0e-4       # default=1.0e-4 (Hartree/bohr)

    #
    # MO output
    #

    MO.fileout                  off        # on|off, default=off
    num.HOMOs                    2         # default=1
    num.LUMOs                    2         # default=1

    #
    # DOS and PDOS
    #

    Dos.fileout                  off       # on|off, default=off
    Dos.Erange              -10.0  10.0    # default = -20 20 
    Dos.Kgrid                 1  1  1      # default = Kgrid1 Kgrid2 Kgrid3

species:
  overrides:
    Fe:
      spin: [8.0, 6.0]
      spin_constraint: on
atom_spins:
  1: [8.0, 6.0]
  2: [6.0, 8.0]
